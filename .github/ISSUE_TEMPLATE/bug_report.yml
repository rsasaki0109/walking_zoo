name: Bug report
description: Report a locomotion_ros2 bug
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction Steps
      description: Include ROS distro, commands, logs, and adapter name.
    validations:
      required: true
