# Embedded C++ RL on the ros2_control split path, tuned for full-Nav2 bringup.
# Lockstep parity needs 500 Hz physics (one MuJoCo step per policy tick); the
# learned residual still refreshes at 50 Hz via decimation inside the gait node.
# Use monolithic sim (launch default) if this starves Nav2 on a small machine.
controller_manager:
  ros__parameters:
    update_rate: 500
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    gait_lab_sil_rl_residual:
      type: locomotion_ros2_gait_lab_sil/GaitLabSilRlResidualController

joint_state_broadcaster:
  ros__parameters: {}

gait_lab_sil_rl_residual:
  ros__parameters:
    policy_path: ""
    action_scale: 0.25
    joints:
      - left_hip_pitch_joint
      - left_hip_roll_joint
      - left_hip_yaw_joint
      - left_knee_joint
      - left_ankle_pitch_joint
      - left_ankle_roll_joint
      - right_hip_pitch_joint
      - right_hip_roll_joint
      - right_hip_yaw_joint
      - right_knee_joint
      - right_ankle_pitch_joint
      - right_ankle_roll_joint
