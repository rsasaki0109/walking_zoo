# Embedded C++ RL on the ros2_control split path, tuned for full-Nav2 bringup.
# 500 Hz starves the Nav2 action servers on a single machine; 50 Hz matches the
# gait_lab policy tick and leaves headroom for planner/controller_server.
controller_manager:
  ros__parameters:
    update_rate: 50
    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    gait_lab_sil_rl_residual:
      type: locomotion_ros2_gait_lab_sil/GaitLabSilRlResidualController

joint_state_broadcaster:
  ros__parameters: {}

gait_lab_sil_rl_residual:
  ros__parameters:
    policy_path: ""
    action_scale: 0.25
    joints:
      - left_hip_pitch_joint
      - left_hip_roll_joint
      - left_hip_yaw_joint
      - left_knee_joint
      - left_ankle_pitch_joint
      - left_ankle_roll_joint
      - right_hip_pitch_joint
      - right_hip_roll_joint
      - right_hip_yaw_joint
      - right_knee_joint
      - right_ankle_pitch_joint
      - right_ankle_roll_joint
