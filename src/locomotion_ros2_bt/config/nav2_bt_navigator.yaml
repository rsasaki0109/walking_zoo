# Nav2 bt_navigator overlay that embeds the locomotion_ros2 recovery into the
# navigate-to-pose recovery branch.
#
# Usage: merge this into your Nav2 params (or pass it after nav2_params.yaml so
# these keys win). Two things matter:
#
#   1. plugin_lib_names adds `locomotion_ros2_nav2_bt_nodes` on top of Nav2's built-in
#      BT plugins (Nav2 loads the built-ins automatically; this only appends).
#   2. default_nav_to_pose_bt_xml points at the tree that wires IsWalkingReady /
#      ClearWalkingFault into the RoundRobin recovery actions.
#
# The $(find-pkg-share ...) substitution is resolved by the launch file that
# loads this file; if you load it directly, replace it with the absolute install
# path of locomotion_ros2_bt/bt_xml/navigate_to_pose_w_walking_recovery.xml.
bt_navigator:
  ros__parameters:
    # Built-in Nav2 BT plugins are still loaded automatically; this appends ours.
    plugin_lib_names:
      - locomotion_ros2_nav2_bt_nodes
    default_nav_to_pose_bt_xml: "$(find-pkg-share locomotion_ros2_bt)/bt_xml/navigate_to_pose_w_walking_recovery.xml"
