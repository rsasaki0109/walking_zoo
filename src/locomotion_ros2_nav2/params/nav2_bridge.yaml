locomotion_ros2_cmd_vel_bridge:
  ros__parameters:
    input_topic: /cmd_vel
    output_topic: /locomotion_ros2/cmd_vel
    state_topic: /locomotion_ros2/state
    frame_id: base_link
    # Shape Nav2 velocities to a legged motion envelope instead of passing the
    # raw Twist straight through.
    legged_aware: true
    # Only forward velocities while the runtime reports the robot balanced and
    # not e-stopped (gates on /locomotion_ros2/state).
    require_ready: true
    legged:
      max_forward: 0.6
      max_backward: 0.3
      max_lateral: 0.3
      max_yaw_rate: 0.8
      max_linear_accel: 1.0
      max_yaw_accel: 2.0
      lateral_deadband: 0.05
      turn_speed_coupling: 0.7
