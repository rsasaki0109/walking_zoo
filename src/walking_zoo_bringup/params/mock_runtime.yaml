walking_zoo_runtime_manager:
  ros__parameters:
    autostart: true
    adapter_plugin: walking_zoo_mock_adapter/MockWalkingAdapter
    robot_profile: ""
    allow_motion: false
    robot_model: mock_legged_robot
    robot_family: quadruped
    base_frame: base_link
    odom_frame: odom
    map_frame: map
    limits:
      max_linear_x: 0.3
      max_linear_y: 0.2
      max_angular_z: 0.5
      max_body_roll: 0.2
      max_body_pitch: 0.2
      command_timeout_sec: 0.25
